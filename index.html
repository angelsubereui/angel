<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-do List</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff7eb9">
    <style>
        :root {
            --bg: #fff0f6; 
            --surface: #ffffff;
            --accent: #ff7eb9; 
            --accent-dark: #f06292;
            --danger: #ff4d4d;
            --text: #4a4a4a;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(var(--accent) 0.5px, transparent 0.5px);
            background-size: 20px 20px; 
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .quest-card {
            background: var(--surface);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 20px;
            border: 4px solid var(--accent);
            box-shadow: 10px 10px 0px rgba(255, 126, 185, 0.2);
            position: relative;
            align-self: flex-start;
            margin-top: 50px;
        }

        h1 {
            text-align: center;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--accent);
            margin-top: 0;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-size: 2rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            background: #fff;
            border: 2px solid var(--accent);
            color: var(--text);
            padding: 12px 15px;
            border-radius: 12px;
            outline: none;
            font-size: 16px;
        }

        input::placeholder {
            color: #ffb3d1;
        }

        .btn-add {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 25px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .btn-add:hover {
            background: var(--accent-dark);
            transform: scale(1.05);
        }

        ul { list-style: none; padding: 0; }

        li {
            background: #fffafa;
            margin-bottom: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #ffe3ed;
            border-radius: 12px;
            transition: 0.3s;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        li:hover {
            border-color: var(--accent);
            transform: translateX(5px);
        }

        
        .btn-outline-danger {
            background: white;
            color: var(--danger);
            border: 2px solid var(--danger);
            border-radius: 8px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-outline-danger:hover {
            background: var(--danger);
            color: white;
        }
    </style>
</head>
<body>

    <div class="quest-card">
        <h1>My Tasks</h1>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="What's the plan?">
            <button class="btn-add" onclick="addTask()">Add</button>
        </div>
        <ul id="taskList"></ul>
    </div>

<script>
    
    const taskList = document.getElementById("taskList");

      function addTask() {
        const input = document.getElementById("taskInput");
        const task = input.value.trim();

        if (task) {
          const li = document.createElement("li");

          li.className =
            "list-group-item d-flex justify-content-between align-items-center mb-2 rounded shadow-sm border";

          li.innerHTML = `
                    <span>${task}</span>
                    <button class="btn btn-outline-danger btn-sm" onclick="this.parentElement.remove()">X</button>
                `;

          taskList.appendChild(li);
          input.value = "";
        }
      }

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/service-worker.js")
          .then(() => {
            console.log("ayos! rehistro as service worker");
          })
          .catch((error) => {
            console.log("Registration failed: ", error);
          });
      }
</script>
</body>
</html>
